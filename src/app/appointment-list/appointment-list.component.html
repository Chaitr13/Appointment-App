<div class="container">
  <div class="card mt-3">
    <div class="row">
      <div class="column">
        <h2 class="text-center">Create new appointment</h2>
      </div>
    </div>
  </div>

  <div class="card mt-3">
    <div class="row">
      <div class="col-md-6">
        <input
          class="form-control"
          [(ngModel)]="newAppointmentTitle"
          placeholder="Appointment Description"
        />
      </div>
      <div class="col-md-4">
        <input
          class="form-control"
          [(ngModel)]="newAppointmentDate"
          type="date"
          placeholder="Appointment Date"
        />
      </div>
      <div class="col-md-2">
        <button class="btn btn-primary w-100" (click)="addAppointment()">
          Add
        </button>
      </div>
    </div>
  </div>

  <h2 class="text-center mt-5">Appointments</h2>
</div>

<div></div>

<ul>
  <li *ngFor="let appointment of appointments; index as i">
    {{ appointment.title }} {{ appointment.date }}
    <button (click)="deleteAppointment(i)">Delete</button>
  </li>
</ul>
